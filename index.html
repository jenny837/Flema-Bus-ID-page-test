<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flema Bus</title>
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            --primary-color: #1677ff;      
            --primary-hover: #4096ff;      
            --primary-light: #e6f4ff;     /* 系統淡藍色 */
            --glow-color: rgba(22, 119, 255, 0.3); 
            --error-red: #ff4d4f;
            --error-glow: rgba(255, 77, 79, 0.25); /* 警示發光 */
            --text-dark: #3b3b3b;
            --text-gray: #535353;             
            --text-muted: #a5a5a5; 
            --hover-gray: #f5f5f5;        /* 選單懸停淡灰 */
            --border-radius-main: 35px;
            --border-radius-input: 12px;
            --glass-blur: blur(30px) saturate(180%);
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #fff; overflow: hidden; position: relative; }
        body::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: url = "img/bg-bus.png.png"; background-size: cover; background-position: center; opacity: 0.3; z-index: -1; }

        /* --- 語言選擇模組 (左字右箭頭 + 懸停發光) --- */
        .custom-select-wrapper {
            position: absolute; top: 30px; right: 30px; width: 155px; z-index: 1000;
            user-select: none; opacity: 0.9;
        }
        .select-trigger {
            padding: 16px 20px; background: rgba(255, 255, 255, 0.7); backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(124, 124, 124, 0.1); border-radius: var(--border-radius-input);
            cursor: pointer; display: flex; align-items: center; 
            justify-content: space-between; /* 文字靠左，箭頭靠右 */
            font-size: 0.9rem; color: var(--text-dark); box-shadow: var(--shadow-float); transition: 0.3s ease;
        }
        /* 語言按鈕懸停發光效果 */
        .select-trigger:hover {
            background: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 12px var(--glow-color), var(--shadow-float);
        }
        /* 按下後：箭頭旋轉 + 字體變淡灰 */
        .custom-select-wrapper.open .select-trigger { 
            background: #fff; border-color: var(--primary-color); 
            color: var(--text-muted); box-shadow: 0 0 12px var(--glow-color); 
        }
        .arrow {
            width: 14px; height: 14px; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .custom-select-wrapper.open .arrow { transform: rotate(180deg); }

        .select-options {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: var(--glass-blur);
            border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: 0.3s;
        }
        .custom-select-wrapper.open .select-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .option { padding: 12px 20px; cursor: pointer; border-radius: 8px; font-size: 0.95rem; transition: 0.2s; color: var(--text-dark); text-align: left; }
        .option:hover { background-color: var(--hover-gray); } 
        /* 選中項：背景淡藍，字體深灰 */
        .option.selected { background-color: var(--primary-light); color: var(--text-dark); font-weight: 600; }

        /* --- 登入面板 --- */
        .login-card {
            background: rgba(255, 255, 255, 0.4); backdrop-filter: var(--glass-blur);
            padding: 45px; border-radius: var(--border-radius-main);
            border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: var(--shadow-float);
            width: 100%; max-width: 420px; text-align: center;
            min-height: 640px; display: flex; flex-direction: column; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .login-card.exit { opacity: 0; transform: scale(1.1) translateY(-20px); filter: blur(15px); pointer-events: none; }
        .logo { width: 230px; margin: 0 auto 20px; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.12)); }
        .brand-name { font-size: 1.5rem; font-weight: 600; color: var(--text-gray); margin-bottom: 8px; }
        .system-title { font-size: 1.5rem; font-weight: 590; color: var(--text-gray); margin-bottom: 30px; } 

        /* --- 輸入框與錯誤發光 --- */
        .form-group { margin-bottom: 12px; position: relative; text-align: left; min-height: 85px; }
        .form-group input {
            width: 100%; padding: 16px; border-radius: var(--border-radius-input);
            border: 1px solid rgba(0,0,0,0.05); background: rgba(255, 255, 255, 0.7);
            outline: none; font-size: 1rem; transition: 0.3s ease;
        }
        .form-group input:focus { background: #fff; border-color: var(--primary-color); box-shadow: 0 0 12px var(--glow-color); }
        /* 警示紅框 + 紅色發光 */
        .form-group input.error { 
            border-color: var(--error-red); 
            background: #fffdfd; 
            box-shadow: 0 0 10px var(--error-glow); 
        }
        .toggle-password { position: absolute; right: 15px; top: 26px; transform: translateY(-50%); cursor: pointer; color: #999; display: flex; align-items: center; z-index: 5; }
        .error-msg { display: none; color: var(--error-red); font-size: 0.75rem; margin-top: 6px; margin-left: 4px; font-weight: 500; }
        input.error + .error-msg { display: block; }

        /* --- 記住用戶 (連動發光) --- */
        .remember-me {
            display: flex; align-items: center; gap: 10px; margin-top: 5px; margin-bottom: 30px;
            cursor: pointer; width: fit-content; padding: 8px 12px; border-radius: 10px;
            transition: 0.3s; color: var(--text-gray); font-size: 0.95rem;
        }
        .remember-me:hover { color: var(--primary-color); }
        .remember-me input { 
            appearance: none; width: 18px; height: 18px; 
            border: 1.5px solid rgba(0,0,0,0.1); border-radius: 4px; 
            position: relative; cursor: pointer; transition: 0.3s; 
            background: rgba(255, 255, 255, 0.5);
        }
        /* 懸停時方框發光 */
        .remember-me:hover input {
            border-color: var(--primary-color);
            box-shadow: 0 0 8px var(--glow-color);
        }
        /* 選取後方框發光 */
        .remember-me input:checked { 
            background-color: var(--primary-color); 
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--glow-color); 
        }
        .remember-me input:checked::after { content: '✓'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; color: white; }

        /* --- 按鈕 --- */
        .login-btn {
            width: 45%; padding: 14px; border-radius: 12px; border: none; align-self: center;
            background: var(--primary-color); color: #fff; font-weight: 550;
            cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center;
        }
        .login-btn:hover { background: var(--primary-hover); box-shadow: 0 0 15px var(--glow-color); transform: translateY(-1px); }
        
        /* 抖動動畫 */
        .shake { animation: shake 0.4s both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255, 255, 255, 0.3); border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin-right: 8px; }
        .loading .spinner { display: block; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="custom-select-wrapper" id="langWrapper">
        <div class="select-trigger" onclick="toggleSelect()">
            <span id="selectedLabel">繁體中文</span>
            <svg class="arrow" viewBox="0 0 24 24">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </div>
        <div class="select-options">
            <div class="option selected" onclick="selectLang('zh-tw', '繁體中文', this)">繁體中文</div>
            <div class="option" onclick="selectLang('vi', 'Tiếng Việt', this)">Tiếng Việt</div>
            <div class="option" onclick="selectLang('en', 'English', this)">English</div>
        </div>
    </div>

    <div class="login-card" id="loginCard">
        <img src="logo.png.png" alt="Logo" class="logo">
        <div class="brand-name">Flema</div>
        <h2 class="system-title" id="txt-title">車隊管理系統</h2>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="input-company" placeholder="公司代碼">
                <span class="error-msg" id="err-company">請輸入公司代碼</span>
            </div>
            <div class="form-group">
                <input type="text" id="input-user" placeholder="用戶名">
                <span class="error-msg" id="err-user">請輸入用戶名</span>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="密碼">
                <span class="error-msg" id="err-pass">請輸入密碼</span>
                <span class="toggle-password" onclick="togglePass()">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </span>
            </div>

            <label class="remember-me">
                <input type="checkbox" id="check-remember">
                <span id="txt-remember">記住用戶</span>
            </label>

            <button type="button" class="login-btn" id="btn-login" onclick="handleLogin()">
                <div class="spinner"></div>
                <span id="btn-text">登入</span>
            </button>
        </form>
    </div>

    <script>
        let currentLangCode = 'zh-tw';
        const translations = {
            'zh-tw': { title: '車隊管理系統', company: '公司代碼', user: '用戶名', pass: '密碼', login: '登入', remember: '記住用戶', errComp: '請輸入公司代碼', errUser: '請輸入用戶名', errPass: '請輸入密碼' },
            'vi': { title: 'Hệ thống quản lý đội xe', company: 'Mã công ty', user: 'Tên người dùng', pass: 'Mật khẩu', login: 'Đăng nhập', remember: 'Ghi nhớ người dùng', errComp: 'Vui lòng nhập mã công ty', errUser: 'Vui lòng nhập tên người dùng', errPass: 'Vui lòng nhập mật khẩu' },
            'en': { title: 'Fleet Management System', company: 'Company Code', user: 'Username', pass: 'Password', login: 'Login', remember: 'Remember Me', errComp: 'Please enter company code', errUser: 'Please enter username', errPass: 'Please enter password' }
        };

        function handleLogin() {
            const btn = document.getElementById('btn-login');
            const inputs = ['input-company', 'input-user', 'password'];
            let isValid = true;

            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el.value.trim() === "") {
                    el.classList.add('error'); 
                    el.closest('.form-group').classList.add('shake');
                    setTimeout(() => el.closest('.form-group').classList.remove('shake'), 400);
                    isValid = false;
                } else {
                    el.classList.remove('error');
                }
            });

            if (isValid) {
                btn.classList.add('loading');
                btn.disabled = true;
                setTimeout(() => { document.getElementById('loginCard').classList.add('exit'); }, 1200);
            }
        }

        function selectLang(val, label, el) {
            currentLangCode = val;
            document.getElementById('selectedLabel').innerText = label;
            document.getElementById('langWrapper').classList.remove('open');
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            const data = translations[val];
            document.getElementById('txt-title').innerText = data.title;
            document.getElementById('input-company').placeholder = data.company;
            document.getElementById('input-user').placeholder = data.user;
            document.getElementById('password').placeholder = data.pass;
            document.getElementById('btn-login').querySelector('#btn-text').innerText = data.login;
            document.getElementById('txt-remember').innerText = data.remember;
            document.getElementById('err-company').innerText = data.errComp;
            document.getElementById('err-user').innerText = data.errUser;
            document.getElementById('err-pass').innerText = data.errPass;
        }

        function togglePass() {
            const p = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            const isPass = p.type === 'password';
            p.type = isPass ? 'text' : 'password';
            icon.innerHTML = isPass 
                ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
                : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }

        function toggleSelect() { document.getElementById('langWrapper').classList.toggle('open'); }
        window.onclick = (e) => { if (!document.getElementById('langWrapper').contains(e.target)) document.getElementById('langWrapper').classList.remove('open'); }
        document.querySelectorAll('input').forEach(input => { input.addEventListener('input', function() { this.classList.remove('error'); }); });
    </script>
</body>
</html>
